<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Calculadora IMC</title>
</head>
<body>
    <main id="container">
        <section id="image-benefits">
            <div id="img">
                <img src="assets/img/personal.svg" alt="Imagem ilustrativa de um personal trainer">
            </div>
            <section id="benefits">
                <h2>Benefícios da Calculadora de IMC</h2>
                <p>Utilize esta ferramenta para avaliar rapidamente a saúde dos seus pacientes, auxiliando na elaboração de dietas e planos de saúde personalizados.</p>
            </section>
        </section>

        <section id="calculator">
            <form id="form">
                <h1 id="title">
                    Calculadora - IMC
                </h1>
                <div class="input-box">
                    <label for="weight">
                        Peso em Kg
                    </label>
                    <div class="input-field">
                        <i class="fa-solid fa-weight-hanging"></i>
                        <input type="number" id="weight" step="0.01" name="weight" required>
                        <span>
                            Kg
                        </span>
                    </div>
                </div>
                <div class="input-box">
                    <label for="height">
                        Altura em metros
                    </label>
                    <div class="input-field">
                        <i class="fa-solid fa-ruler"></i>
                        <input type="number" step="0.01" id="height" name="height" required>
                        <span>
                            m
                        </span>
                    </div>
                </div>
                <button id="calculate">
                    Calcular
                </button>
            </form>

            <div id="infos" class="hidden">
                <div id="result">
                    <div id="bmi">
                        <span id="value"></span>
                        <span>Seu IMC</span>
                    </div>
                    <div id="description">
                        <span></span>
                    </div>
                    <div id="img-container">
                        <img id="img-underweight" src="assets/img/sad_pear.png" alt="Imagem ilustrativa de baixo peso" class="hidden">
                        <img id="img-normal" src="assets/img/pear.png" alt="Imagem ilustrativa de peso normal" class="hidden">
                        <img id="img-overweight" src="assets/img/sad_pear.png" alt="Imagem ilustrativa de sobrepeso" class="hidden">
                        <img id="img-obesity1" src="assets/img/sad_pear.png" alt="Imagem ilustrativa de obesidade grau 1" class="hidden">
                        <img id="img-obesity2" src="assets/img/sad_pear.png" alt="Imagem ilustrativa de obesidade grau 2" class="hidden">
                        <img id="img-obesity3" src="assets/img/sad_pear.png" alt="Imagem ilustrativa de obesidade grau 3" class="hidden">
                    </div>
                </div>
                <div id="more_info">
                    <a href="https://mundoeducacao.uol.com.br/saude-bem-estar" target="_blank" rel="noopener noreferrer">
                        Mais informações sobre o IMC
                        <i class="fa-solid fa-link"></i>
                    </a>
                    <a href="https://www.google.com/search?sa=X&sca_esv=1ab39f923ada7f25&sca_upv=1&sxsrf=ADLYWIIT3vmzjz5gs0nLXDI_ZEDXWdMFxw:1720669340666&q=nutricionistas+perto+de+mim&ved=2ahUKEwiIic3miJ6HAxWHppUCHZGkBhgQuzF6BAgaEAQ&biw=955&bih=944&dpr=1" target="_blank" rel="noopener noreferrer">
                        Nutricionistas perto de mim
                        <i class="fa-solid fa-link"></i>
                    </a>
                </div>
            </div>
        </section>
    </main>
    <script src="assets/js/script.js"></script>
</body>
</html>
